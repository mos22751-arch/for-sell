<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">BRAND social preview</title>
  <desc id="desc">A dark profile preview card template.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061c23"/>
      <stop offset="0.55" stop-color="#050506"/>
      <stop offset="1" stop-color="#25110a"/>
    </linearGradient>
    <radialGradient id="cyan" cx="26%" cy="32%" r="50%">
      <stop offset="0" stop-color="#39d0ff" stop-opacity="0.33"/>
      <stop offset="1" stop-color="#39d0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orange" cx="82%" cy="30%" r="48%">
      <stop offset="0" stop-color="#ff7a3d" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ff7a3d" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <clipPath id="avatarClip">
      <circle cx="914" cy="315" r="118"/>
    </clipPath>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#cyan)"/>
  <rect width="1200" height="630" fill="url(#orange)"/>
  <g opacity="0.13">
    <path d="M0 132H1200M0 264H1200M0 396H1200M0 528H1200" stroke="#fff"/>
    <path d="M160 0V630M320 0V630M480 0V630M640 0V630M800 0V630M960 0V630" stroke="#fff"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="72" y="72" width="1056" height="486" rx="34" fill="#ffffff" fill-opacity="0.065" stroke="#ffffff" stroke-opacity="0.16"/>
    <circle cx="914" cy="315" r="118" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
    <image href="profile.webp" x="796" y="197" width="236" height="236" preserveAspectRatio="xMidYMin slice" clip-path="url(#avatarClip)"/>
    <circle cx="914" cy="315" r="118" fill="none" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="122" y="166" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#ff7a3d">TEMPLATE OWNER / BRAND</text>
    <text x="122" y="288" font-family="Arial, sans-serif" font-size="92" font-weight="900" fill="#f7f5ef">My links, work,</text>
    <text x="122" y="392" font-family="Arial, sans-serif" font-size="92" font-weight="900" fill="#f7f5ef">and pages I build.</text>
    <text x="122" y="470" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#a7acb7">Simple pages. Clean details. Easy contact.</text>
    <g transform="translate(122 505)">
      <rect width="112" height="42" rx="21" fill="#39d0ff" fill-opacity="0.18" stroke="#39d0ff" stroke-opacity="0.55"/>
      <text x="56" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#f7f5ef">Links</text>
      <rect x="126" width="116" height="42" rx="21" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="184" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#f7f5ef">Work</text>
      <rect x="256" width="138" height="42" rx="21" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="325" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#f7f5ef">Contact</text>
    </g>
  </g>
